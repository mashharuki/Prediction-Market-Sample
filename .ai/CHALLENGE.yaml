            "can't trade",
            "backing",
            "collateral",
            "mint",
            "nothing to buy",
            "empty",
          ]
        hint: "Token supply is calculated from msg.value. If it's zero, how many tokens would be minted?"

    task:
      description: |
        Open `packages/hardhat/contracts/PredictionMarket.sol`.

        1. **Declare state variables** in the State Variables section:
           ```solidity
           address public immutable i_oracle;
           uint256 public immutable i_initialTokenValue;
           uint256 public immutable i_percentageLocked;
           uint256 public immutable i_initialYesProbability;
           string public s_question;
           uint256 public s_ethCollateral;
           uint256 public s_lpTradingRevenue;
           ```

        2. **In the constructor**, add validations and assignments under `/// Checkpoint 2 ///`:
           - Revert with `PredictionMarket__MustProvideETHForInitialLiquidity()` if `msg.value == 0`
           - Revert with `PredictionMarket__InvalidProbability()` if probability is 0 or >= 100
           - Revert with `PredictionMarket__InvalidPercentageToLock()` if percentage is 0 or >= 100
           - Store all immutable and state variables
           - Set `s_ethCollateral = msg.value`

        Say **"check"** when you're ready!
      file:
        hardhat: "packages/hardhat/contracts/PredictionMarket.sol"
        foundry: "packages/foundry/contracts/PredictionMarket.sol"
      test:
        hardhat: "yarn test --grep 'Checkpoint2'"
        foundry: "yarn test --match-test 'Checkpoint2'"
      hints:
        - "Declare immutables at the contract level, then assign them in the constructor. Use `i_oracle = _oracle;` etc."
        - |
          Full constructor checkpoint 2 code:
          ```solidity
          if (msg.value == 0) revert PredictionMarket__MustProvideETHForInitialLiquidity();
          if (_initialYesProbability >= 100 || _initialYesProbability == 0) revert PredictionMarket__InvalidProbability();
          if (_percentageToLock >= 100 || _percentageToLock == 0) revert PredictionMarket__InvalidPercentageToLock();
          i_oracle = _oracle;
          s_question = _question;
          i_initialTokenValue = _initialTokenValue;
          i_initialYesProbability = _initialYesProbability;
          i_percentageLocked = _percentageToLock;
