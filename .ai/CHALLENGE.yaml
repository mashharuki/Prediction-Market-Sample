name: "Prediction Markets"
version: "1.0"
description: "Build a binary prediction market with ERC20 outcome tokens, AMM pricing, oracle reporting, and token redemption"
difficulty: "advanced"
estimated_time: "4 - 12 hours"

setup:
  file:
    hardhat: "packages/hardhat/contracts/PredictionMarket.sol"
    foundry: "packages/foundry/contracts/PredictionMarket.sol"

welcome_message: |
  Welcome to the Prediction Markets Challenge!

  You'll build a complete **binary prediction market** where users bet on a yes-or-no question (a car race!) by buying and selling ERC20 outcome tokens.

  You'll implement:
  1. **Market setup** — constructor with state variables and token minting
  2. **Liquidity management** — add/remove ETH liquidity
  3. **Oracle reporting** — report the outcome on-chain
  4. **Market resolution** — LP withdraws winnings and fees
  5. **Pricing engine** — linear AMM pricing based on probability
  6. **Trading** — buy/sell outcome tokens
  7. **Redemption** — winners cash out

  **Before we start, open separate terminal windows** (not this one!) and run:

  1. Start your local blockchain:
     ```
     yarn chain
     ```
  2. In another terminal, deploy the contracts:
     ```
     yarn deploy
     ```
  3. In another terminal, start the frontend:
     ```
     yarn start
     ```
  4. Open http://localhost:3000 in your browser.

  > These commands run continuously, so each needs its own terminal window.

  Head to the **Debug Contracts** tab — you should find a smart contract named **PredictionMarket**. Since we haven't implemented any functions yet, they won't work, nor will you see all the necessary state variables.

  Go to the **User** tab and check out the car race! The race is entirely separate and has no impact on the smart contract.

  **How this works:**
  - I'll teach you a concept, then give you a coding task
  - You write the code in your editor, then say **"check"** and I'll run the tests
  - Say **"hint"** anytime you're stuck
  - Use **`/skip`** if you want me to write the code and explain it

  > Re-run `yarn deploy --reset` whenever you want to redeploy with a fresh contract address.

  Your progress is saved automatically. Use `/start` to resume anytime.

  Let's build a prediction market!

checkpoints:
  # ============================================================
  # CHECKPOINT 1: Constructor Setup
  # ============================================================
  - id: "constructor-setup"
    title: "Market Setup — Constructor"
    description: "Set up state variables and validate constructor parameters"

    context: |
      ## How Prediction Markets Work

      A prediction market lets users bet on yes-or-no questions. Users buy **outcome tokens** — "Yes" or "No" — and if their token wins, it pays out a fixed ETH amount (e.g., 0.01 ETH). Losing tokens are worth 0.

      ### The Architecture

      Our market has three roles:
      1. **Market Owner / LP** — deploys the market, provides initial liquidity
      2. **Oracle** — reports which outcome won
      3. **Users** — buy/sell outcome tokens

      ### Constructor Parameters

      When deploying, the LP provides:
      - `_oracle` — address authorized to report the outcome
      - `_question` — the question being asked
      - `_initialTokenValue` — ETH payout per winning token (e.g., 0.01 ETH)
      - `_initialYesProbability` — starting probability (1-99)
      - `_percentageToLock` — how many tokens to lock for initial probability (1-99)
      - `msg.value` — initial ETH liquidity

      ### State Variables

      You need to declare and store:
      ```solidity
      address public immutable i_oracle;
      uint256 public immutable i_initialTokenValue;
      uint256 public immutable i_percentageLocked;
      uint256 public immutable i_initialYesProbability;
      string public s_question;
      uint256 public s_ethCollateral;      // total ETH backing tokens
      uint256 public s_lpTradingRevenue;   // fees from trading
      ```

      ### Validations
      - `msg.value` must be > 0 (need initial liquidity)
      - `_initialYesProbability` must be > 0 and < 100
      - `_percentageToLock` must be > 0 and < 100

    questions:
