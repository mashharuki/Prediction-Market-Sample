  # ============================================================
  # CHECKPOINT 2: Mint Tokens
  # ============================================================
  - id: "mint-tokens"
    title: "Mint Outcome Tokens"
    description: "Deploy Yes/No ERC20 tokens and lock initial amounts to set starting probability"

    context: |
      ## Token Minting & Probability

      The market needs two ERC20 tokens — "Yes" and "No". These are deployed as `PredictionMarketToken` contracts inside the constructor.

      ### Calculating Token Supply

      The number of tokens equals the ETH liquidity divided by the token value:
      ```solidity
      uint256 initialTokenAmount = (msg.value * PRECISION) / _initialTokenValue;
      ```
      `PRECISION = 1e18` handles decimal math in Solidity.

      ### Setting Initial Probability Through Locking

      Without any trades, the probability is undefined. We simulate initial trades by **locking** tokens (transferring them to the owner address, where they can't be traded back):

      ```
      lockedYes = initialTokenAmount * yesProbability * percentageToLock * 2 / 10000
      lockedNo  = initialTokenAmount * (100 - yesProbability) * percentageToLock * 2 / 10000
      ```

      For example: 100 tokens, 60% yes probability, 10% lock:
      - lockedYes = 100 * 60 * 10 * 2 / 10000 = 12
      - lockedNo = 100 * 40 * 10 * 2 / 10000 = 8
      - Starting probability = 12 / (12 + 8) = 60%

      ### Why Lock Tokens?

      Without locking, a single buy pushes probability to 100%. Locking provides price stability from the start.

      After implementing, uncomment the code below `/// Checkpoint 3 ///` in `getPrediction()`.

    questions:
      - text: "Without locking any tokens, what would happen to the probability when the very first user buys?"
        concepts:
