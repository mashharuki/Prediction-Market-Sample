        Still in the constructor, under `/// Checkpoint 3 ///`:

        1. **Declare token state variables**:
           ```solidity
           PredictionMarketToken public immutable i_yesToken;
           PredictionMarketToken public immutable i_noToken;
           ```

        2. **Calculate initial token amount**: `(msg.value * PRECISION) / _initialTokenValue`

        3. **Deploy both tokens**:
           ```solidity
