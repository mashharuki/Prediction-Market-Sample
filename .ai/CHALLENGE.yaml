        if (msg.value == 0) revert PredictionMarket__MustProvideETHForInitialLiquidity();
        if (_initialYesProbability >= 100 || _initialYesProbability == 0) revert PredictionMarket__InvalidProbability();
        if (_percentageToLock >= 100 || _percentageToLock == 0) revert PredictionMarket__InvalidPercentageToLock();
        i_oracle = _oracle;
        s_question = _question;
        i_initialTokenValue = _initialTokenValue;
        i_initialYesProbability = _initialYesProbability;
