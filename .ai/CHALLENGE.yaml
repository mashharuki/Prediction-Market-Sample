          ```
      solution: |
        // State variables:
        PredictionMarketToken public immutable i_yesToken;
        PredictionMarketToken public immutable i_noToken;

        // Constructor Checkpoint 3:
        uint256 initialTokenAmount = (msg.value * PRECISION) / _initialTokenValue;
        i_yesToken = new PredictionMarketToken("Yes", "Y", msg.sender, initialTokenAmount);
        i_noToken = new PredictionMarketToken("No", "N", msg.sender, initialTokenAmount);
        uint256 initialYesAmountLocked = (initialTokenAmount * _initialYesProbability * _percentageToLock * 2) / 10000;
        uint256 initialNoAmountLocked = (initialTokenAmount * (100 - _initialYesProbability) * _percentageToLock * 2) / 10000;
        bool success1 = i_yesToken.transfer(msg.sender, initialYesAmountLocked);
        bool success2 = i_noToken.transfer(msg.sender, initialNoAmountLocked);
        if (!success1 || !success2) revert PredictionMarket__TokenTransferFailed();

  # ============================================================
  # CHECKPOINT 3: Liquidity Management
  # ============================================================
  - id: "liquidity"
    title: "Add and Remove Liquidity"
    description: "Let the LP inject or withdraw ETH while minting/burning proportional tokens"

    context: |
      ## Liquidity Management

      The LP needs to add or remove ETH from the market. When ETH is added, proportional Yes/No tokens are minted. When removed, tokens are burned.

      ### addLiquidity

      - Update `s_ethCollateral += msg.value`
      - Calculate tokens: `(msg.value * PRECISION) / i_initialTokenValue`
      - Mint both Yes and No tokens to `address(this)`
      - Emit `LiquidityAdded`

      ### removeLiquidity

      - Calculate tokens to burn: `(_ethToWithdraw / i_initialTokenValue) * PRECISION`
      - Check both token reserves are sufficient (revert with `PredictionMarket__InsufficientTokenReserve`)
      - Update `s_ethCollateral -= _ethToWithdraw`
      - Burn tokens from `address(this)`
      - Send ETH to owner
      - Emit `LiquidityRemoved`

    questions:
      - text: "Why do we mint BOTH Yes and No tokens when adding liquidity, rather than just one?"
        concepts:
          [
            "balanced",
            "both sides",
            "neutral",
            "ratio",
            "probability",
            "doesn't change",
            "proportional",
          ]
        hint: "What would happen to the probability if we only minted Yes tokens? The market should stay balanced when adding liquidity."

    task:
      description: |
        Open `packages/hardhat/contracts/PredictionMarket.sol`.

        Implement under `/// Checkpoint 4 ///`:

        1. **`addLiquidity()`**: Update collateral, calculate and mint tokens, emit event
        2. **`removeLiquidity(uint256 _ethToWithdraw)`**: Calculate burn amount, check reserves, update collateral, burn tokens, send ETH, emit event

        Say **"check"** when you're ready!
      file:
        hardhat: "packages/hardhat/contracts/PredictionMarket.sol"
        foundry: "packages/foundry/contracts/PredictionMarket.sol"
      test:
        hardhat: "yarn test --grep 'Checkpoint4'"
        foundry: "yarn test --match-test 'Checkpoint4'"
      hints:
        - "For `addLiquidity`: `uint256 tokensAmount = (msg.value * PRECISION) / i_initialTokenValue;` then mint both tokens to `address(this)`."
        - |
          Full solutions:
          ```solidity
          function addLiquidity() external payable onlyOwner {
              s_ethCollateral += msg.value;
              uint256 tokensAmount = (msg.value * PRECISION) / i_initialTokenValue;
              i_yesToken.mint(address(this), tokensAmount);
              i_noToken.mint(address(this), tokensAmount);
              emit LiquidityAdded(msg.sender, msg.value, tokensAmount);
          }

          function removeLiquidity(uint256 _ethToWithdraw) external onlyOwner {
              uint256 amountTokenToBurn = (_ethToWithdraw / i_initialTokenValue) * PRECISION;
              if (amountTokenToBurn > i_yesToken.balanceOf(address(this))) revert PredictionMarket__InsufficientTokenReserve(Outcome.YES, amountTokenToBurn);
              if (amountTokenToBurn > i_noToken.balanceOf(address(this))) revert PredictionMarket__InsufficientTokenReserve(Outcome.NO, amountTokenToBurn);
              s_ethCollateral -= _ethToWithdraw;
              i_yesToken.burn(address(this), amountTokenToBurn);
              i_noToken.burn(address(this), amountTokenToBurn);
              (bool success, ) = msg.sender.call{value: _ethToWithdraw}("");
              if (!success) revert PredictionMarket__ETHTransferFailed();
              emit LiquidityRemoved(msg.sender, _ethToWithdraw, amountTokenToBurn);
          }
          ```
      solution: |
        function addLiquidity() external payable onlyOwner {
            s_ethCollateral += msg.value;
            uint256 tokensAmount = (msg.value * PRECISION) / i_initialTokenValue;
            i_yesToken.mint(address(this), tokensAmount);
            i_noToken.mint(address(this), tokensAmount);
            emit LiquidityAdded(msg.sender, msg.value, tokensAmount);
        }

        function removeLiquidity(uint256 _ethToWithdraw) external onlyOwner {
            uint256 amountTokenToBurn = (_ethToWithdraw / i_initialTokenValue) * PRECISION;
            if (amountTokenToBurn > i_yesToken.balanceOf(address(this))) revert PredictionMarket__InsufficientTokenReserve(Outcome.YES, amountTokenToBurn);
            if (amountTokenToBurn > i_noToken.balanceOf(address(this))) revert PredictionMarket__InsufficientTokenReserve(Outcome.NO, amountTokenToBurn);
            s_ethCollateral -= _ethToWithdraw;
            i_yesToken.burn(address(this), amountTokenToBurn);
            i_noToken.burn(address(this), amountTokenToBurn);
            (bool success, ) = msg.sender.call{value: _ethToWithdraw}("");
            if (!success) revert PredictionMarket__ETHTransferFailed();
            emit LiquidityRemoved(msg.sender, _ethToWithdraw, amountTokenToBurn);
        }

  # ============================================================
  # CHECKPOINT 4: Oracle Report & Market Resolution
  # ============================================================
  - id: "oracle-resolution"
    title: "Oracle Report & Market Resolution"
    description: "Implement oracle reporting, market resolution, and the predictionNotReported/predictionReported modifiers"

    context: |
      ## Oracle & Resolution

      ### Report Function

      The oracle reports which outcome won. Only the `i_oracle` address can call it, and it can only be called once.

      You need:
      - State variables: `s_winningToken` (PredictionMarketToken) and `s_isReported` (bool)
      - A `predictionNotReported` modifier that reverts if already reported
      - Apply this modifier to `addLiquidity` and `removeLiquidity` too

      ### resolveMarketAndWithdraw

      After reporting, the LP can:
      1. Redeem the contract's winning tokens for ETH
      2. Collect accumulated `s_lpTradingRevenue`
      3. Burn the winning tokens
      4. Send total ETH to the LP

      You need a `predictionReported` modifier (opposite of `predictionNotReported`).

      After implementing report, uncomment code below `/// Checkpoint 5 ///` in `getPrediction()`.

    questions:
      - text: "The report function can only be called once. Why is it important that the oracle cannot change or re-report the outcome?"
        concepts:
          [
            "once",
            "final",
            "immutable",
            "trust",
            "settled",
            "can't change",
            "already redeemed",
            "irreversible",
          ]
        hint: "After reporting, users start redeeming tokens for ETH. What would happen if the winning outcome could be changed after some users already cashed out?"

    task:
      description: |
        Open `packages/hardhat/contracts/PredictionMarket.sol`.

        1. **Add state variables**:
           ```solidity
           PredictionMarketToken public s_winningToken;
           bool public s_isReported;
           ```

        2. **Implement modifiers**:
           - `predictionNotReported` — revert with `PredictionMarket__PredictionAlreadyReported()` if `s_isReported`
           - `predictionReported` — revert with `PredictionMarket__PredictionNotReported()` if `!s_isReported`
           - Add `predictionNotReported` to `addLiquidity` and `removeLiquidity`

        3. **Implement `report(Outcome _winningOutcome)`** (Checkpoint 5):
           - Only `i_oracle` can call (revert with `PredictionMarket__OnlyOracleCanReport()`)
           - Set `s_winningToken` based on outcome
           - Set `s_isReported = true`
           - Emit `MarketReported`

        4. **Implement `resolveMarketAndWithdraw()`** (Checkpoint 6):
           - Get contract's winning token balance, calculate ETH value
           - Cap at `s_ethCollateral`
           - Add `s_lpTradingRevenue`, reset it to 0
           - Burn winning tokens, send ETH
           - Emit `MarketResolved`

        5. **Uncomment** code below `/// Checkpoint 5 ///` in `getPrediction()`

        Say **"check"** when you're ready!

        After writing the code:

        1. Run `yarn deploy --reset` to deploy your updated contracts.
        2. Go to the **Oracle** tab and report the outcome (watch the race first!).
        3. Make sure you're connected with the correct oracle address — check `00_deploy_your_contract.ts` to find out which one is being used.
        4. Then go to the **Liquidity Provider** tab and try the **Resolve Market and Withdraw** function. Watch as tokens are burned and ETH flows back to the deployer.
      file:
        hardhat: "packages/hardhat/contracts/PredictionMarket.sol"
        foundry: "packages/foundry/contracts/PredictionMarket.sol"
      test:
        hardhat: "yarn test --grep 'Checkpoint5|Checkpoint6'"
        foundry: "yarn test --match-test 'Checkpoint5|Checkpoint6'"
      hints:
        - "For `report`: `s_winningToken = _winningOutcome == Outcome.YES ? i_yesToken : i_noToken;`"
        - |
          Full `resolveMarketAndWithdraw`:
          ```solidity
          function resolveMarketAndWithdraw() external onlyOwner predictionReported returns (uint256 ethRedeemed) {
              uint256 contractWinningTokens = s_winningToken.balanceOf(address(this));
              if (contractWinningTokens > 0) {
                  ethRedeemed = (contractWinningTokens * i_initialTokenValue) / PRECISION;
                  if (ethRedeemed > s_ethCollateral) ethRedeemed = s_ethCollateral;
                  s_ethCollateral -= ethRedeemed;
              }
              uint256 totalEthToSend = ethRedeemed + s_lpTradingRevenue;
              s_lpTradingRevenue = 0;
              s_winningToken.burn(address(this), contractWinningTokens);
              (bool success, ) = msg.sender.call{value: totalEthToSend}("");
              if (!success) revert PredictionMarket__ETHTransferFailed();
              emit MarketResolved(msg.sender, totalEthToSend);
              return ethRedeemed;
          }
          ```
      solution: |
        // State variables:
        PredictionMarketToken public s_winningToken;
        bool public s_isReported;

        // Modifiers:
        modifier predictionNotReported() {
            if (s_isReported) revert PredictionMarket__PredictionAlreadyReported();
            _;
        }
        modifier predictionReported() {
            if (!s_isReported) revert PredictionMarket__PredictionNotReported();
            _;
        }

        // report:
        function report(Outcome _winningOutcome) external predictionNotReported {
            if (msg.sender != i_oracle) revert PredictionMarket__OnlyOracleCanReport();
            s_winningToken = _winningOutcome == Outcome.YES ? i_yesToken : i_noToken;
            s_isReported = true;
            emit MarketReported(msg.sender, _winningOutcome, address(s_winningToken));
        }

        // resolveMarketAndWithdraw:
        function resolveMarketAndWithdraw() external onlyOwner predictionReported returns (uint256 ethRedeemed) {
            uint256 contractWinningTokens = s_winningToken.balanceOf(address(this));
            if (contractWinningTokens > 0) {
                ethRedeemed = (contractWinningTokens * i_initialTokenValue) / PRECISION;
                if (ethRedeemed > s_ethCollateral) ethRedeemed = s_ethCollateral;
                s_ethCollateral -= ethRedeemed;
            }
            uint256 totalEthToSend = ethRedeemed + s_lpTradingRevenue;
            s_lpTradingRevenue = 0;
            s_winningToken.burn(address(this), contractWinningTokens);
            (bool success, ) = msg.sender.call{value: totalEthToSend}("");
            if (!success) revert PredictionMarket__ETHTransferFailed();
            emit MarketResolved(msg.sender, totalEthToSend);
            return ethRedeemed;
        }

  # ============================================================
  # CHECKPOINT 5: Pricing Engine
  # ============================================================
  - id: "pricing"
    title: "Pricing & Probability Calculations"
    description: "Implement the linear AMM pricing engine with probability-based token prices"

    context: |
      ## Linear Pricing Model

      Token prices reflect the market's implied probability. The formula:

      ```
      price = initialTokenValue * probabilityAvg * tradingAmount
      ```

      ### How Probability Is Calculated

      Probability = tokens sold / total tokens sold (both sides):
      ```solidity
      probability = (tokensSold * PRECISION) / totalSold
      ```

      ### The Pricing Flow

      1. **Get reserves**: `_getCurrentReserves` returns (selected token reserve, other token reserve)
      2. **Calculate probability before trade**: based on current tokens sold
      3. **Calculate probability after trade**: simulate the trade
      4. **Average** the before/after probabilities
      5. **Final price**: `(initialTokenValue * probabilityAvg * tradingAmount) / (PRECISION * PRECISION)`

      For buying: reserve decreases → more tokens "sold" → probability goes up
      For selling: reserve increases → fewer tokens "sold" → probability goes down

      `getBuyPriceInEth` and `getSellPriceInEth` are thin wrappers calling `_calculatePriceInEth` with a `_isSelling` flag.

    questions:
      - text: "When buying tokens, the reserve decreases. How does that affect the probability calculation for that outcome?"
        concepts:
          [
            "sold",
            "increase",
            "goes up",
            "fewer in reserve",
            "more sold",
            "higher",
            "demand",
            "probability rises",
          ]
        hint: "Look at the formula: probability = tokens sold / total sold. If the reserve decreases, tokens sold increases — what happens to the ratio?"

    task:
      description: |
        Implement five functions in `PredictionMarket.sol` under `/// Checkpoint 7 ///`:

        1. **`_calculateProbability(uint256 tokensSold, uint256 totalSold)`**: Return `(tokensSold * PRECISION) / totalSold`

        2. **`_getCurrentReserves(Outcome _outcome)`**: Return (selected token balance, other token balance) of `address(this)`

        3. **`_calculatePriceInEth(Outcome _outcome, uint256 _tradingAmount, bool _isSelling)`**:
           - Get reserves, calculate before/after probabilities, average them
           - If buying: check reserve >= tradingAmount
           - Return `(i_initialTokenValue * probabilityAvg * _tradingAmount) / (PRECISION * PRECISION)`

        4. **`getBuyPriceInEth`**: Call `_calculatePriceInEth(..., false)`
        5. **`getSellPriceInEth`**: Call `_calculatePriceInEth(..., true)`

        Say **"check"** when you're ready!
      file:
        hardhat: "packages/hardhat/contracts/PredictionMarket.sol"
        foundry: "packages/foundry/contracts/PredictionMarket.sol"
      test:
        hardhat: "yarn test --grep 'Checkpoint7'"
        foundry: "yarn test --match-test 'Checkpoint7'"
      hints:
        - |
          `_getCurrentReserves`:
          ```solidity
          if (_outcome == Outcome.YES) {
              return (i_yesToken.balanceOf(address(this)), i_noToken.balanceOf(address(this)));
          } else {
              return (i_noToken.balanceOf(address(this)), i_yesToken.balanceOf(address(this)));
          }
          ```
        - |
          Key `_calculatePriceInEth` logic:
          ```solidity
          uint256 totalTokenSupply = i_yesToken.totalSupply();
          uint256 currentTokenSoldBefore = totalTokenSupply - currentTokenReserve;
          uint256 currentOtherTokenSold = totalTokenSupply - currentOtherTokenReserve;
          uint256 totalTokensSoldBefore = currentTokenSoldBefore + currentOtherTokenSold;
          uint256 probabilityBefore = _calculateProbability(currentTokenSoldBefore, totalTokensSoldBefore);
          // After trade: adjust reserves based on _isSelling
          uint256 currentTokenReserveAfter = _isSelling ? currentTokenReserve + _tradingAmount : currentTokenReserve - _tradingAmount;
          uint256 currentTokenSoldAfter = totalTokenSupply - currentTokenReserveAfter;
          uint256 totalTokensSoldAfter = _isSelling ? totalTokensSoldBefore - _tradingAmount : totalTokensSoldBefore + _tradingAmount;
          uint256 probabilityAfter = _calculateProbability(currentTokenSoldAfter, totalTokensSoldAfter);
          uint256 probabilityAvg = (probabilityBefore + probabilityAfter) / 2;
          return (i_initialTokenValue * probabilityAvg * _tradingAmount) / (PRECISION * PRECISION);
          ```
      solution: |
        function getBuyPriceInEth(Outcome _outcome, uint256 _tradingAmount) public view returns (uint256) {
            return _calculatePriceInEth(_outcome, _tradingAmount, false);
        }
        function getSellPriceInEth(Outcome _outcome, uint256 _tradingAmount) public view returns (uint256) {
            return _calculatePriceInEth(_outcome, _tradingAmount, true);
        }
        function _calculatePriceInEth(Outcome _outcome, uint256 _tradingAmount, bool _isSelling) private view returns (uint256) {
            (uint256 currentTokenReserve, uint256 currentOtherTokenReserve) = _getCurrentReserves(_outcome);
            if (!_isSelling) {
                if (currentTokenReserve < _tradingAmount) revert PredictionMarket__InsufficientLiquidity();
            }
            uint256 totalTokenSupply = i_yesToken.totalSupply();
            uint256 currentTokenSoldBefore = totalTokenSupply - currentTokenReserve;
            uint256 currentOtherTokenSold = totalTokenSupply - currentOtherTokenReserve;
            uint256 totalTokensSoldBefore = currentTokenSoldBefore + currentOtherTokenSold;
            uint256 probabilityBefore = _calculateProbability(currentTokenSoldBefore, totalTokensSoldBefore);
            uint256 currentTokenReserveAfter = _isSelling ? currentTokenReserve + _tradingAmount : currentTokenReserve - _tradingAmount;
            uint256 currentTokenSoldAfter = totalTokenSupply - currentTokenReserveAfter;
            uint256 totalTokensSoldAfter = _isSelling ? totalTokensSoldBefore - _tradingAmount : totalTokensSoldBefore + _tradingAmount;
            uint256 probabilityAfter = _calculateProbability(currentTokenSoldAfter, totalTokensSoldAfter);
            uint256 probabilityAvg = (probabilityBefore + probabilityAfter) / 2;
            return (i_initialTokenValue * probabilityAvg * _tradingAmount) / (PRECISION * PRECISION);
        }
        function _getCurrentReserves(Outcome _outcome) private view returns (uint256, uint256) {
            if (_outcome == Outcome.YES) return (i_yesToken.balanceOf(address(this)), i_noToken.balanceOf(address(this)));
            else return (i_noToken.balanceOf(address(this)), i_yesToken.balanceOf(address(this)));
        }
        function _calculateProbability(uint256 tokensSold, uint256 totalSold) private pure returns (uint256) {
            return (tokensSold * PRECISION) / totalSold;
        }

  # ============================================================
  # CHECKPOINT 6: Buy/Sell Tokens
  # ============================================================
  - id: "trading"
    title: "Buy and Sell Tokens"
    description: "Implement buyTokensWithETH and sellTokensForEth with modifiers"

    context: |
      ## Trading

      Users buy/sell outcome tokens. Two custom modifiers are needed:
      - `notOwner` — the LP can't trade (they already have exposure)
      - `amountGreaterThanZero(uint256 _amount)` — reject zero-amount trades

      ### buyTokensWithETH

      - Calculate price with `getBuyPriceInEth`, require `msg.value == ethNeeded`
      - Check token reserve is sufficient
      - Add `msg.value` to `s_lpTradingRevenue` (the LP earns from trades)
      - Transfer tokens to buyer
      - Emit `TokensPurchased`

      ### sellTokensForEth

      - Check user has enough tokens AND has approved the contract
      - Calculate ETH with `getSellPriceInEth`
      - Subtract from `s_lpTradingRevenue`
      - Send ETH to seller, pull tokens back via `transferFrom`
      - Emit `TokensSold`

    questions:
      - text: "In buyTokensWithETH, why do we require msg.value to exactly equal ethNeeded instead of just checking msg.value >= ethNeeded?"
        concepts:
          [
            "exact",
            "overpay",
            "no refund",
            "stuck",
            "lost ETH",
            "precise",
            "no change",
            "trapped",
          ]
        hint: "If a user sends more ETH than needed, what happens to the extra? The contract doesn't send change back."

    task:
      description: |
        In `PredictionMarket.sol`:

        1. **Add modifiers** (Checkpoint 8):
           ```solidity
           modifier notOwner() { if (msg.sender == owner()) revert PredictionMarket__OwnerCannotCall(); _; }
           modifier amountGreaterThanZero(uint256 _amount) { if (_amount == 0) revert PredictionMarket__AmountMustBeGreaterThanZero(); _; }
           ```

        2. **Implement `buyTokensWithETH`** with modifiers `amountGreaterThanZero`, `predictionNotReported`, `notOwner`

        3. **Implement `sellTokensForEth`** with same modifiers

        Say **"check"** when you're ready!

        After writing the code:

        1. Run `yarn deploy --reset` to deploy your updated contracts.
        2. Go to the **User** tab to test buying and selling tokens and see how the probability changes.
        3. Make sure you **use another account** (not the liquidity provider), otherwise you'll be restricted from trading.
      file:
        hardhat: "packages/hardhat/contracts/PredictionMarket.sol"
        foundry: "packages/foundry/contracts/PredictionMarket.sol"
      test:
        hardhat: "yarn test --grep 'Checkpoint8'"
        foundry: "yarn test --match-test 'Checkpoint8'"
      hints:
        - "For buy: `uint256 ethNeeded = getBuyPriceInEth(_outcome, _amountTokenToBuy); if (msg.value != ethNeeded) revert PredictionMarket__MustSendExactETHAmount();`"
        - |
          Full solutions in the last hint of the previous checkpoint's solution pattern — check the README for complete code.
      solution: |
        modifier notOwner() { if (msg.sender == owner()) revert PredictionMarket__OwnerCannotCall(); _; }
        modifier amountGreaterThanZero(uint256 _amount) { if (_amount == 0) revert PredictionMarket__AmountMustBeGreaterThanZero(); _; }

        function buyTokensWithETH(Outcome _outcome, uint256 _amountTokenToBuy) external payable amountGreaterThanZero(_amountTokenToBuy) predictionNotReported notOwner {
            uint256 ethNeeded = getBuyPriceInEth(_outcome, _amountTokenToBuy);
            if (msg.value != ethNeeded) revert PredictionMarket__MustSendExactETHAmount();
            PredictionMarketToken optionToken = _outcome == Outcome.YES ? i_yesToken : i_noToken;
            if (_amountTokenToBuy > optionToken.balanceOf(address(this))) revert PredictionMarket__InsufficientTokenReserve(_outcome, _amountTokenToBuy);
            s_lpTradingRevenue += msg.value;
            bool success = optionToken.transfer(msg.sender, _amountTokenToBuy);
            if (!success) revert PredictionMarket__TokenTransferFailed();
            emit TokensPurchased(msg.sender, _outcome, _amountTokenToBuy, msg.value);
        }

        function sellTokensForEth(Outcome _outcome, uint256 _tradingAmount) external amountGreaterThanZero(_tradingAmount) predictionNotReported notOwner {
            PredictionMarketToken optionToken = _outcome == Outcome.YES ? i_yesToken : i_noToken;
            uint256 userBalance = optionToken.balanceOf(msg.sender);
            if (userBalance < _tradingAmount) revert PredictionMarket__InsufficientBalance(_tradingAmount, userBalance);
            uint256 allowance = optionToken.allowance(msg.sender, address(this));
            if (allowance < _tradingAmount) revert PredictionMarket__InsufficientAllowance(_tradingAmount, allowance);
            uint256 ethToReceive = getSellPriceInEth(_outcome, _tradingAmount);
            s_lpTradingRevenue -= ethToReceive;
            (bool sent, ) = msg.sender.call{value: ethToReceive}("");
            if (!sent) revert PredictionMarket__ETHTransferFailed();
            bool success = optionToken.transferFrom(msg.sender, address(this), _tradingAmount);
            if (!success) revert PredictionMarket__TokenTransferFailed();
            emit TokensSold(msg.sender, _outcome, _tradingAmount, ethToReceive);
        }

