  # CHECKPOINT 7: Redeem Winning Tokens
  # ============================================================
  - id: "redeem"
    title: "Redeem Winning Tokens"
    description: "Let winners cash out their tokens for ETH"

    context: |
      ## Token Redemption

      After the oracle reports the outcome, users holding winning tokens can redeem each one for `i_initialTokenValue` ETH.

      The redemption process:
      1. Check market is reported (`predictionReported`)
      2. Verify user has enough winning tokens
      3. Calculate ETH: `(_amount * i_initialTokenValue) / PRECISION`
      4. Subtract from `s_ethCollateral`
      5. Burn the winning tokens
      6. Send ETH to user
      7. Emit `WinningTokensRedeemed`

      The `notOwner` modifier prevents the LP from redeeming (they use `resolveMarketAndWithdraw` instead).

    questions:
      - text: "In the redemption flow, why do we subtract from s_ethCollateral? What does s_ethCollateral represent in the market?"
        concepts:
          [
            "backing",
            "reserve",
            "total ETH",
            "collateral",
            "tokens outstanding",
            "owed",
            "track",
            "balance",
          ]
        hint: "s_ethCollateral tracks how much ETH backs the outstanding tokens. When tokens are redeemed, that ETH is no longer needed — what happens if we don't update it?"

    task:
      description: |
        Implement `redeemWinningTokens(uint256 _amount)` with modifiers `amountGreaterThanZero`, `predictionReported`, `notOwner`:

        1. Check user has enough winning tokens (revert with `PredictionMarket__InsufficientWinningTokens()`)
        2. Calculate ETH: `(_amount * i_initialTokenValue) / PRECISION`
        3. Subtract from `s_ethCollateral`
        4. Burn tokens from user: `s_winningToken.burn(msg.sender, _amount)`
        5. Send ETH to user
        6. Emit `WinningTokensRedeemed`

        Say **"check"** when you're ready!

        After writing the code:

        1. Run `yarn deploy --reset` to deploy your updated contracts.
        2. Purchase some winning tokens on the **User** tab first.
        3. Report the race via the **Oracle** tab.
        4. Then redeem your tokens on the **User** tab.
      file:
        hardhat: "packages/hardhat/contracts/PredictionMarket.sol"
        foundry: "packages/foundry/contracts/PredictionMarket.sol"
      test:
        hardhat: "yarn test --grep 'Checkpoint9'"
        foundry: "yarn test --match-test 'Checkpoint9'"
      hints:
        - "The ETH calculation: `uint256 ethToReceive = (_amount * i_initialTokenValue) / PRECISION;` — then subtract from `s_ethCollateral`, burn, and send."
        - |
          Full solution:
          ```solidity
          function redeemWinningTokens(uint256 _amount) external amountGreaterThanZero(_amount) predictionReported notOwner {
              if (s_winningToken.balanceOf(msg.sender) < _amount) revert PredictionMarket__InsufficientWinningTokens();
              uint256 ethToReceive = (_amount * i_initialTokenValue) / PRECISION;
              s_ethCollateral -= ethToReceive;
              s_winningToken.burn(msg.sender, _amount);
              (bool success, ) = msg.sender.call{value: ethToReceive}("");
              if (!success) revert PredictionMarket__ETHTransferFailed();
              emit WinningTokensRedeemed(msg.sender, _amount, ethToReceive);
          }
          ```
      solution: |
        function redeemWinningTokens(uint256 _amount) external amountGreaterThanZero(_amount) predictionReported notOwner {
            if (s_winningToken.balanceOf(msg.sender) < _amount) revert PredictionMarket__InsufficientWinningTokens();
            uint256 ethToReceive = (_amount * i_initialTokenValue) / PRECISION;
            s_ethCollateral -= ethToReceive;
            s_winningToken.burn(msg.sender, _amount);
            (bool success, ) = msg.sender.call{value: ethToReceive}("");
            if (!success) revert PredictionMarket__ETHTransferFailed();
            emit WinningTokensRedeemed(msg.sender, _amount, ethToReceive);
        }

completion_message: |
  Congratulations — you've completed the Prediction Markets Challenge!

  You built a complete binary prediction market with:
  - **ERC20 outcome tokens** — Yes/No tokens minted and locked for initial probability
  - **Liquidity management** — add/remove ETH with proportional token minting/burning
  - **Oracle reporting** — on-chain outcome resolution with access control
  - **Linear AMM pricing** — probability-based pricing with before/after averaging
  - **Token trading** — buy/sell with proper validation, modifiers, and fee tracking
  - **Token redemption** — winners cash out at fixed payout value

  Key concepts you learned:
  - AMM pricing vs order books
  - Probability calculations from token distributions
  - Token locking for initial market conditions
  - Oracle patterns for off-chain data
  - Modifier composition for access control
  - LP economics — revenue from trades, risk from outcome exposure

  ## Next Steps

  To submit your challenge, complete the remaining checkpoints on the
  [Speedrun Ethereum challenge page](https://speedrunethereum.com/challenge/prediction-markets):
  - Deploy your contract
  - Ship your frontend
  - Verify your contract
