            "100%",
            "jump",
            "extreme",
            "stability",
            "single buy",
            "no depth",
            "spike",
            "first trade",
          ]
        hint: "Think about the probability formula: tokens sold / total sold. If nothing is sold yet, one small buy dominates completely."

    task:
